CONFIG_NRF5340_AUDIO_CS47L63_DRIVER=y
CONFIG_TRANSPORT_BIS=y
CONFIG_AUDIO_SOURCE_I2S=y
CONFIG_BT_AUDIO_BROADCAST_NAME="TAMAUDIO"
CONFIG_AUDIO_TEST_TONE=y

CONFIG_BT_BAP_BROADCAST_16_2_1=y

# TAM board has no physical UART and USB D+/D- are not routed to the nRF5340.
# Use RTT via J-Link for console, logs, and shell (prj.conf enables these).
CONFIG_USB_CDC_ACM=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_RTT=n
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_BUFFER=0
CONFIG_LOG_BACKEND_RTT_MESSAGE_SIZE=512
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG_PRINTK=y
CONFIG_FAULT_DUMP=2
